<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — oppa19</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    /* ── 대시보드 차트 ── */
    .dash-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.5rem; }
    @media(max-width:900px){ .dash-grid{grid-template-columns:repeat(2,1fr);} }
    @media(max-width:600px){ .dash-grid{grid-template-columns:1fr;} }

    .dash-card {
      background:var(--bg-elevated);
      border:1px solid rgba(255,255,255,0.09);
      border-radius:var(--radius-md);
      padding:1.25rem 1.5rem;
      position:relative;
      overflow:hidden;
    }
    .dash-card__label { font-size:var(--text-xs); color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.4rem; }
    .dash-card__value { font-family:var(--font-numeric); font-size:2rem; font-weight:700; color:var(--gold); line-height:1; }
    .dash-card__value--em { color:var(--emerald); }
    .dash-card__value--blue { color:var(--accent-blue,#5ab5ff); }
    .dash-card__sub { font-size:var(--text-xs); color:var(--text-muted); margin-top:.35rem; }
    .dash-card__accent {
      position:absolute;
      width:80px;height:80px;
      border-radius:50%;
      filter:blur(40px);
      top:-20px;right:-20px;
      pointer-events:none;
    }

    /* ── 바 차트 ── */
    .bar-chart { display:flex; flex-direction:column; gap:.75rem; }
    .bar-item { display:grid; grid-template-columns:90px 1fr 60px; align-items:center; gap:.75rem; }
    .bar-label { font-size:var(--text-xs); color:var(--text-secondary); text-align:right; white-space:nowrap; }
    .bar-track { height:8px; background:rgba(255,255,255,0.07); border-radius:4px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:4px; transition:width .8s var(--ease-out-expo); }
    .bar-count { font-size:var(--text-xs); font-family:var(--font-numeric); color:var(--text-muted); text-align:right; }

    /* ── 도넛 차트 (SVG) ── */
    .donut-wrap { display:flex; align-items:center; gap:1.5rem; }
    .donut-legend { display:flex; flex-direction:column; gap:.5rem; }
    .donut-legend-item { display:flex; align-items:center; gap:.5rem; font-size:var(--text-xs); color:var(--text-secondary); }
    .donut-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }

    /* ── 섹션 레이아웃 ── */
    .section-block { display:none; }
    .section-block.active { display:block; }

    /* ── 섹션 헤더 ── */
    .sec-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
    .sec-hd__title { font-size:var(--text-lg); font-weight:700; color:var(--text-primary); }
    .sec-hd__sub { font-size:var(--text-xs); color:var(--text-muted); margin-top:.2rem; }

    /* ── 알림 뱃지 ── */
    .nav-badge {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:18px; height:18px; padding:0 5px;
      background:var(--gold); color:#0c1829;
      font-size:10px; font-weight:700;
      border-radius:9px; margin-left:auto;
    }
  </style>
</head>
<body class="admin-body">

<!-- ===== 로그인 화면 ===== -->
<div id="login-screen" style="display:none;">
  <div class="admin-login">
    <div class="login-card" id="login-card">
      <div class="login-logo">⚡ 관리자 패널</div>
      <div class="login-subtitle">oppa19 — Claude Code 한국</div>

      <div class="login-field">
        <label for="admin-username">사용자명</label>
        <input type="text" id="admin-username" placeholder="사용자명 입력"
          autocomplete="username" spellcheck="false">
      </div>
      <div class="login-field">
        <label for="admin-password">비밀번호</label>
        <input type="password" id="admin-password" placeholder="비밀번호 입력"
          autocomplete="current-password">
      </div>

      <div class="login-error" id="login-error" role="alert" aria-live="assertive"></div>
      <button class="btn btn--gold btn--full" id="login-btn" onclick="handleLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- ===== 대시보드 화면 ===== -->
<div id="dashboard-screen" style="display:none;">
  <div class="admin-layout">

    <!-- 사이드바 -->
    <nav class="admin-sidebar" aria-label="관리자 메뉴">
      <div class="admin-sidebar__logo">⚡ CC 한국 관리자</div>

      <div class="admin-sidebar__title">메뉴</div>
      <button class="admin-nav-item" data-section="dashboard" onclick="showSection('dashboard')">
        <span aria-hidden="true">📊</span> 대시보드
      </button>
      <button class="admin-nav-item" data-section="ads" onclick="showSection('ads')">
        <span aria-hidden="true">📢</span> 광고 관리
      </button>
      <button class="admin-nav-item" data-section="partners" onclick="showSection('partners')">
        <span aria-hidden="true">🔗</span> 파트너 링크
        <span class="nav-badge" id="sidebar-app-badge" style="display:none;">0</span>
      </button>
      <button class="admin-nav-item" onclick="window.open('../index.html','_blank')">
        <span aria-hidden="true">🌐</span> 사이트 보기
      </button>

      <div class="admin-sidebar__logout">
        <button class="admin-nav-item" onclick="adminLogout()">
          <span aria-hidden="true">🚪</span> 로그아웃
        </button>
      </div>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main class="admin-main">

      <!-- 공통 헤더 -->
      <div class="admin-header">
        <div>
          <div class="admin-header__title" id="main-title">대시보드</div>
          <div class="admin-header__sub"  id="main-sub">사이트 현황을 한눈에 파악하세요</div>
        </div>
        <button class="btn btn--gold btn--sm" id="header-refresh-btn" onclick="refreshCurrentSection()">새로고침</button>
      </div>

      <!-- ════ 대시보드 섹션 ════ -->
      <div id="section-dashboard" class="section-block active">

        <!-- 컨텐츠 현황 -->
        <div class="sec-hd">
          <div>
            <div class="sec-hd__title">컨텐츠 현황</div>
            <div class="sec-hd__sub">카테고리별 등록 컴포넌트 수</div>
          </div>
        </div>

        <div class="dash-grid" id="content-stat-cards"><!-- JS --></div>

        <!-- 2열 레이아웃 -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">

          <!-- 카테고리 바 차트 -->
          <div class="dash-card">
            <div class="dash-card__label" style="margin-bottom:1rem;">카테고리별 비율</div>
            <div class="bar-chart" id="category-bar-chart"><!-- JS --></div>
          </div>

          <!-- 운영 현황 -->
          <div class="dash-card">
            <div class="dash-card__label" style="margin-bottom:1rem;">운영 현황</div>
            <div id="ops-stats"><!-- JS --></div>
          </div>

        </div>

        <!-- 파트너 + 광고 요약 -->
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;">
          <div class="dash-card" id="partner-summary-card"><!-- JS --></div>
          <div class="dash-card" id="ads-summary-card"><!-- JS --></div>
        </div>

      </div><!-- /section-dashboard -->

      <!-- ════ 광고 관리 섹션 ════ -->
      <div id="section-ads" class="section-block">

        <div style="background:var(--gold-dim);border:1px solid rgba(212,175,55,0.2);border-radius:var(--radius-md);padding:.9rem 1.25rem;margin-bottom:1.5rem;font-size:var(--text-sm);color:var(--text-secondary);line-height:1.6;">
          <strong style="color:var(--gold);">사용법:</strong>
          편집 버튼 → 광고 HTML 입력 → 토글 활성화. 광고는 <strong>localStorage</strong>에 저장됩니다.
        </div>

        <div class="dash-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.5rem;">
          <div class="admin-stat-card">
            <div class="admin-stat-card__label">전체 슬롯</div>
            <div class="admin-stat-card__value" id="stat-total">11</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-card__label">활성화된 광고</div>
            <div class="admin-stat-card__value" id="stat-active">0</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-card__label">광고 위치</div>
            <div class="admin-stat-card__value" style="color:var(--emerald);font-size:1rem;">헤더·사이드바·팝업</div>
          </div>
        </div>

        <div class="ad-slots-list" id="ad-slots-list"></div>

      </div><!-- /section-ads -->

      <!-- ════ 파트너 링크 섹션 ════ -->
      <div id="section-partners" class="section-block">

        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem;">
          <div class="admin-stat-card">
            <div class="admin-stat-card__label">등록된 파트너</div>
            <div class="admin-stat-card__value" id="stat-partners">0</div>
          </div>
          <div class="admin-stat-card">
            <div class="admin-stat-card__label">승인 대기 신청</div>
            <div class="admin-stat-card__value" id="stat-apps" style="color:var(--gold);">0</div>
          </div>
        </div>

        <div class="sec-hd">
          <div>
            <div class="sec-hd__title">파트너 링크 목록</div>
          </div>
          <button class="btn btn--gold btn--sm" onclick="openPartnerModal(null)">+ 링크 추가</button>
        </div>
        <div class="ad-slots-list" id="partners-list" style="margin-bottom:2rem;"></div>

        <div style="padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.07);margin-bottom:1rem;">
          <div class="sec-hd__title" style="font-size:var(--text-base);">신청 대기 목록</div>
          <div class="sec-hd__sub">프론트엔드 신청 양식을 통해 접수된 신청입니다.</div>
        </div>
        <div class="ad-slots-list" id="applications-list"></div>

      </div><!-- /section-partners -->

    </main>
  </div>
</div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/ads.js"></script>
<script src="../assets/js/partners.js"></script>
<script src="../assets/js/admin.js"></script>
</body>
</html>
