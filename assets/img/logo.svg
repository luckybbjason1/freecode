<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="o-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FF9F1C"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="num-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#40E0FF"/>
      <stop offset="50%" style="stop-color:#7B6FFF"/>
      <stop offset="100%" style="stop-color:#00DDA3"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="5" width="300" height="90" rx="18" fill="#0c0c1e"/>
  <rect x="1" y="6" width="298" height="88" rx="17" fill="none" stroke="rgba(255,215,0,0.35)" stroke-width="1.5"/>

  <!-- oppa text (gold) -->
  <text x="12" y="64"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="54" font-weight="900"
        fill="url(#o-grad)"
        filter="url(#glow)"
        letter-spacing="-2">oppa</text>

  <!-- 19 text (cyan-purple) -->
  <text x="170" y="64"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="54" font-weight="900"
        fill="url(#num-grad)"
        filter="url(#shadow)"
        letter-spacing="-2">19</text>

  <!-- .com badge -->
  <rect x="244" y="14" width="48" height="20" rx="10" fill="rgba(0,221,163,0.18)" stroke="rgba(0,221,163,0.5)" stroke-width="1"/>
  <text x="268" y="28"
        font-family="Arial, sans-serif"
        font-size="11" font-weight="700"
        fill="#00DDA3" text-anchor="middle">.com</text>

  <!-- Free badge -->
  <rect x="12" y="70" width="90" height="22" rx="11" fill="#22c55e"/>
  <text x="57" y="85"
        font-family="Arial, sans-serif"
        font-size="12" font-weight="700"
        fill="white" text-anchor="middle">100% FREE!</text>
</svg>
