<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="free-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF4081"/>
    </linearGradient>
    <linearGradient id="code-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#40E0FF"/>
      <stop offset="50%" style="stop-color:#7B6FFF"/>
      <stop offset="100%" style="stop-color:#40C4FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="5" width="320" height="90" rx="18" fill="#0a0a0f"/>
  <rect x="1" y="6" width="318" height="88" rx="17" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>

  <!-- FREE text -->
  <text x="12" y="62"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="52" font-weight="900"
        fill="url(#free-grad)"
        filter="url(#shadow)"
        letter-spacing="-1">FREE</text>

  <!-- Dash -->
  <text x="140" y="62"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="52" font-weight="900"
        fill="#fff" filter="url(#shadow)">-</text>

  <!-- CODE text -->
  <text x="163" y="62"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="52" font-weight="900"
        fill="url(#code-grad)"
        filter="url(#shadow)"
        letter-spacing="-1">CODE</text>

  <!-- 100% FREE badge -->
  <rect x="12" y="70" width="104" height="22" rx="11" fill="#22c55e"/>
  <text x="64" y="85"
        font-family="Arial, sans-serif"
        font-size="12" font-weight="700"
        fill="white" text-anchor="middle">100% FREE!</text>

  <!-- Code bracket icon -->
  <text x="278" y="65"
        font-family="'Courier New', monospace"
        font-size="32" font-weight="700"
        fill="rgba(64,224,255,0.6)">&lt;/&gt;</text>
</svg>
